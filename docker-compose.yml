services:

  neo4j:
    image: ${NEO4J_IMAGE:-docker.io/neo4j:2026-community}
    container_name: neo4j
    volumes:
      - ./dev-servers/neo4j/logs:/logs
      - ./dev-servers/neo4j/config:/config
      - ./dev-servers/neo4j/data:/data
      - ./dev-servers/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-SuperSecurePassw0rd}
    ports:
      - "${NEO4J_PORT:-7474}:7474"
      - "7687:7687"
    restart: always
    networks:
      - servers

  postgres:
    image: ${POSTGRES_DOCKER_IMAGE:-docker.io/postgres:18-alpine}
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SuperSecurePassw0rd}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./dev-servers/postgres/data:/var/lib/postgresql/docker
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - servers

  # pgvector:
  #   image: ${PGVECTOR_DOCKER_IMAGE:-docker.io/pgvector/pgvector:pg18-trixie}
  #   container_name: pgvector
  #   environment:
  #     - POSTGRES_USER=${PGVECTOR_USER:-postgres}
  #     - POSTGRES_PASSWORD=${PGVECTOR_PASSWORD:-SuperSecurePassw0rd}
  #     - POSTGRES_DB=${PGVECTOR_DB:-postgres}
  #   ports:
