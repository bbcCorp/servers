  #     - servers

  redis:
    image: ${REDIS_IMAGE:-docker.io/redis:8-alpine}
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./dev-servers/redis/data:/data
    restart: always
    networks:
      - servers

  # redis-stack-server:
  #   image: ${REDIS_SERVER_STACK_DOCKER_IMAGE:-docker.io/redis/redis-stack-server:latest}
  #   container_name: redis-stack-server
  #   ports:
  #     - "${REDIS_PORT:-6379}:6379"
  #     - "${REDIS_UI_PORT:-8001}:8001"
  #   volumes:
  #     - ./dev-servers/redis-stack-server/data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 30s
  #     retries: 50
  #     start_period: 30s
  #   restart: always
  #   networks:
  #     - servers

  rabbitmq:
    image: ${RABBITMQ_DOCKER_IMAGE:-docker.io/rabbitmq:4.3.2-management-alpine}
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RMQ_USERNAME:-rmquser}
      - RABBITMQ_DEFAULT_PASS=${RMQ_PASSWORD:-SuperSecurePassw0rd}
    volumes:
      - ./dev-servers/rabbitmq/data:/var/lib/rabbitmq
    restart: always
    networks:
      - servers

  # mongo:
  #   image: ${MONGO_DOCKER_IMAGE:-percona/percona-server-mongodb:latest}
  #   container_name: mongo
  #   ports:
  #     - "${MONGO_PORT:-27017}:27017"
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-mongoadmin}
  #     - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-SuperSecurePassw0rd}
  #   volumes:
  #     - ./dev-servers/mongo/data:/data/db
  #   restart: always
  #   networks:
  #     - servers


  # n8n Agent Workflow server
  # Remeber to set the permission to the folder
  # sudo chown -R 1000:1000 ./dev-servers/n8n
  # sudo chmod -R 775 ./dev-servers/n8n
  n8n:
    image: ${N8N_DOCKER_IMAGE:-n8nio/n8n:stable}
    container_name: n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC+05:30}
      - TZ="${TIMEZONE:-UTC+05:30}"
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-postgres}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT:-5432}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-postgres}
      - DB_POSTGRESDB_SCHEMA=${POSTGRES_N8N_SCHEMA:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-SuperSecurePassw0rd}
    restart: always
    volumes:
      - ./dev-servers/n8n/data:/home/node/.n8n
    depends_on:
      - rabbitmq
      - postgres
    networks:
      - servers

  minio:
    image: ${MINIO_DOCKER_IMAGE:-minio/minio:latest}
    container_name: minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./dev-servers/minio/data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_DATA_DIR=/data
      - MINIO_DEFAULT_BUCKET=${MINIO_BUCKET_NAME:-mys3bucket}
    command: server /data --console-address ":9001"
    restart: always
    networks:
      - servers

